services:
  - type: web
    name: cpa-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 180 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FLASK_DEBUG
        value: "0"
      - key: GEMINI_API_KEY
        sync: false
      - key: RATE_LIMIT_ANALYSES_PER_HOUR
        value: "6"
